installed:
- agent-context
settings:
  auto_execute_hooks: true
hooks:
  before_plan:
    - extension: web-research-grounding
      command: speckit.research-grounding
      enabled: true
      optional: false
      priority: 1
      condition: null
      description: Fetch real docs for all dependencies before Phase 0 runs
      prompt: |
        Read the feature spec at the FEATURE_SPEC path (from setup-plan.sh output).

        Extract every item that is:
        - A named library, package, or tool
        - A version number (explicit or implied)
        - A behavioral claim about an external dependency
        - Marked NEEDS CLARIFICATION

        For each extracted item:
        1. web_search "{item} official docs 2025"
        2. web_fetch the official docs, PyPI, npm, or GitHub page returned
        3. Record the result as:
           ITEM: <name>
           SOURCE: <url fetched>
           VERSION: <exact current stable version>
           KEY FACTS: <3-5 bullets from the docs>
           STATUS: CONFIRMED | UNVERIFIED | FETCH FAILED

        Rules:
        - If fetch fails, still record the item with STATUS: FETCH FAILED
        - Never drop an item silently
        - Flag any source older than 12 months as POTENTIALLY STALE

        Save the full output to .specify/memory/verified-sources.md

        Do not exit until every extracted item has a STATUS entry in that file.

  before_tasks:
    - extension: task-grounding
      command: speckit.task-grounding
      enabled: true
      optional: false
      priority: 1
      condition: null
      description: Snapshot real project structure and verified deps before task generation
      prompt: |
        You are grounding the task generator before it writes tasks.md.
        Do not generate tasks. Only collect and record context.

        Step 1 — Load verified sources:
        Read .specify/memory/verified-sources.md if it exists.
        Extract all CONFIRMED items into a flat list:
          VERIFIED DEP: <name> | VERSION: <x.y.z> | SOURCE: <url>
        If the file does not exist, write:
          WARNING: verified-sources.md missing — task descriptions must not reference library APIs or version-specific behavior

        Step 2 — Scan project structure:
        List the actual directory tree from the project root (2-3 levels deep).
        Record it as-is. Do not infer or guess missing directories.

        Step 3 — Scan existing source files:
        For each source file found in Step 2:
        - Record its path
        - Record exported functions, classes, or CLI commands if readable in under 50 lines
        - Mark as EXISTS: <path>

        Step 4 — Read design artifacts:
        Read plan.md and record:
        - The exact directory structure it defines
        - The exact module/file names it specifies
        For each path in plan.md, check if it EXISTS in Step 3 or is NEW.
        Flag mismatches:
          MISMATCH: plan.md says <path> but filesystem has <actual>

        Step 5 — Save output:
        Write all findings to .specify/memory/task-context.md in this format:

        ## Verified Dependencies
        [output of Step 1]

        ## Project Structure (actual)
        [output of Step 2]

        ## Existing Files
        [output of Step 3]

        ## Plan vs Filesystem
        [output of Step 4 — confirmed paths and mismatches]

        Do not exit until task-context.md is written.

  before_analyze:
    - extension: analysis-grounding
      command: speckit.analysis-grounding
      enabled: true
      optional: false
      priority: 1
      condition: null
      description: Assemble reality context before cross-artifact analysis runs
      prompt: |
        You are preparing context for the analyzer. Do not analyze anything.
        Only assemble and record. All operations are read-only.

        Step 1 — Check prior grounding artifacts:
        - Read .specify/memory/verified-sources.md — if missing, write:
            GROUNDING WARNING: verified-sources.md not found
            Impact: analyzer cannot detect version drift or API hallucinations in artifacts
        - Read .specify/memory/task-context.md — if missing, write:
            GROUNDING WARNING: task-context.md not found
            Impact: analyzer cannot detect path mismatches against real filesystem

        Step 2 — Extract reality anchors:
        From verified-sources.md (if present), extract:
          ANCHOR DEP: <name> | VERSION: <x.y.z> | CONFIRMED BEHAVIORS: <key facts>

        From task-context.md (if present), extract:
          ANCHOR PATH: <path> | STATUS: EXISTS | NEW | MISMATCH
          ANCHOR MISMATCH: plan says <a> but filesystem has <b>

        Step 3 — Scan artifacts for reality claims:
        Read plan.md and extract every:
        - Version number or version range written for any dependency
        - API call, function signature, or config option named explicitly
        - File path or directory structure defined

        For each extracted claim, cross-reference against Step 2 anchors:
          CLAIM: <exact text from plan.md>
          ANCHOR: <matching anchor or NONE>
          VERDICT: MATCHES | VERSION DRIFT | PATH CONFLICT | NO ANCHOR

        Step 4 — Write analysis-context.md:
        Save to .specify/memory/analysis-context.md:

        ## Grounding Status
        [warnings from Step 1, or "All grounding artifacts present"]

        ## Reality Anchors
        [dep anchors and path anchors from Step 2]

        ## Artifact Reality Claims
        [all claims and verdicts from Step 3]

        ## Drift Summary
        COUNT: VERSION DRIFT findings: N
        COUNT: PATH CONFLICT findings: N
        COUNT: NO ANCHOR findings: N

        Do not exit until analysis-context.md is written.

  after_specify:
    - extension: agent-context
      command: speckit.agent-context.update
      enabled: true
      optional: true
      priority: 10
      prompt: Execute speckit.agent-context.update?
      description: Refresh agent context after specification
      condition: null

  after_plan:
    - extension: agent-context
      command: speckit.agent-context.update
      enabled: true
      optional: true
      priority: 10
      prompt: Execute speckit.agent-context.update?
      description: Refresh agent context after planning
      condition: null

  after_tasks:
    - extension: agent-context
      command: speckit.agent-context.update
      enabled: true
      optional: true
      priority: 10
      prompt: Execute speckit.agent-context.update?
      description: Refresh agent context after task generation
      condition: null

  after_analyze:
    - extension: agent-context
      command: speckit.agent-context.update
      enabled: true
      optional: true
      priority: 10
      prompt: Execute speckit.agent-context.update?
      description: Refresh agent context after analysis
      condition: null
  before_implement:
    - extension: impl-grounding
      command: speckit.impl-grounding
      enabled: true
      optional: false
      priority: 1
      condition: null
      description: Verify grounding chain and runtime environment before any code is written
      prompt: |
        You are preparing the implementation environment. Do not write any code.
        Do not modify any source files. Only collect, verify, and record.

        Step 1 — Verify grounding chain:
        Check that all three memory files exist:
          .specify/memory/verified-sources.md
          .specify/memory/task-context.md
          .specify/memory/analysis-context.md

        For each missing file, write:
          CHAIN BROKEN: <filename> not found
          Impact: <what detection was skipped>
          Required action: Run <speckit.research-grounding | speckit.task-grounding | speckit.analysis-grounding> first

        If any CHAIN BROKEN entries exist, halt and report them before proceeding to Step 2.

        Step 2 — Snapshot runtime environment:
        Run each command that applies to this project and record exact output:

          python3 --version        → RUNTIME: python <version>
          node --version           → RUNTIME: node <version>
          npm --version            → RUNTIME: npm <version>
          rustc --version          → RUNTIME: rustc <version>
          go version               → RUNTIME: go <version>

        For Python projects — run ONE of:
          pip freeze               → installed packages with exact versions
          uv pip freeze            → if uv is the package manager
          poetry show              → if poetry is the package manager

        Record as:
          INSTALLED: <package> | VERSION: <x.y.z>

        For Node projects — run ONE of:
          npm list --depth=0       → installed packages
          yarn list --depth=0

        Record as:
          INSTALLED: <package> | VERSION: <x.y.z>

        Step 3 — Cross-check plan vs runtime:
        Read plan.md and extract every version number or version range specified.
        Read verified-sources.md and extract all CONFIRMED versions.

        For each planned dependency, compare against INSTALLED list from Step 2:
          PLAN MATCH: <package> planned <x.y.z> | installed <x.y.z> → OK
          VERSION DRIFT: <package> planned <x.y.z> | installed <a.b.c> → MISMATCH
          NOT INSTALLED: <package> planned <x.y.z> | not found in environment

        Step 4 — Fresh filesystem snapshot:
        Re-scan the project root (2 levels deep).
        Compare against task-context.md's "Project Structure (actual)" section.
        Flag any directory or file that is new since task-context.md was written:
          NEW SINCE TASKS: <path>
        Flag any path that task-context.md listed as EXISTS but is now gone:
          REMOVED SINCE TASKS: <path>

        Step 5 — Capture tasks baseline:
        Read tasks.md and count:
          TASKS TOTAL: N
          TASKS COMPLETE [X]: N
          TASKS PENDING [ ]: N
        List the first pending task ID and description:
          FIRST PENDING: <T001> <description>

        Step 6 — Write impl-context.md:
        Save to .specify/memory/impl-context.md:

        ## Grounding Chain
        [Step 1 results — OK or CHAIN BROKEN entries]

        ## Runtime Environment
        [Step 2 results — all RUNTIME entries]

        ## Installed Packages
        [Step 2 pip/npm output]

        ## Plan vs Runtime
        [Step 3 — PLAN MATCH, VERSION DRIFT, NOT INSTALLED entries]

        ## Filesystem Delta
        [Step 4 — NEW SINCE TASKS and REMOVED SINCE TASKS entries]

        ## Tasks Baseline
        [Step 5 counts and FIRST PENDING]

        ## Implementation Clearance
        If VERSION DRIFT or NOT INSTALLED entries exist:
          STATUS: BLOCKED
          Reason: <list each blocking item>
          Resolution: Install missing deps or update plan.md to match installed versions
        Else if CHAIN BROKEN entries exist:
          STATUS: BLOCKED
          Reason: Grounding chain incomplete
        Else:
          STATUS: CLEAR — implementation may proceed

        Do not exit until impl-context.md is written and Implementation Clearance is set.

  after_implement:
    - extension: agent-context
      command: speckit.agent-context.update
      enabled: true
      optional: true
      priority: 10
      prompt: Execute speckit.agent-context.update?
      description: Refresh agent context after implementation
      condition: null
